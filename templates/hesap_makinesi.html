<body style="font-family:sans-serif; text-align:center; padding:50px; background:#f4f7f6;">
    <a href="/" style="text-decoration:none; color:#1a73e8; font-weight:bold;">← Menüye Dön</a>
    <h2 style="color:#2c3e50; margin-top:20px;">Standart Hesap Makinesi</h2>
    
    <div style="background:white; display:inline-block; padding:30px; border-radius:15px; shadow: 0 4px 6px rgba(0,0,0,0.1);">
        <form method="POST">
            <input type="number" step="any" name="s1" placeholder="Sayı 1" required style="padding:10px; border-radius:5px; border:1px solid #ddd;">
            
            <select name="islem" style="padding:10px; border-radius:5px;">
                <option value="topla">+</option>
                <option value="cikar">-</option>
                <option value="carp">×</option>
                <option value="bol">÷</option>
            </select>
            
            <input type="number" step="any" name="s2" placeholder="Sayı 2" required style="padding:10px; border-radius:5px; border:1px solid #ddd;">
            
            <button type="submit" style="padding:10px 20px; background:#1a73e8; color:white; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">Hesapla</button>
        </form>

        {% if sonuc %}
        <div style="margin-top:20px; padding:15px; background:#e8f0fe; border-radius:8px; color:#1a73e8; font-size:1.2rem;">
            <strong>İşlem Sonucu: {{ sonuc }}</strong>
        </div>
        {% endif %}
    </div>
</body>
